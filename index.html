<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moji Video Spotovi</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a2e; color: white; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #e94560; font-size: 2.5em; margin-bottom: 10px; }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .video-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; max-width: 1200px; margin: 0 auto; }
        .video-card { background: #16213e; border-radius: 15px; padding: 15px; width: 350px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); transition: transform 0.3s; }
        .video-card:hover { transform: scale(1.03); }
        .video-card video { width: 100%; border-radius: 10px; background: #000; }
        .video-card h3 { color: #e94560; margin: 10px 0 5px; font-size: 1.1em; }
        .video-card p { color: #aaa; font-size: 0.9em; margin: 0; }
        .footer { margin-top: 40px; color: #555; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>🎵 Moji Video Spotovi</h1>
    <p class="subtitle">Svi moji spotovi na jednom mjestu</p>
    <div class="video-container">

        <div class="video-card">
            <video controls>
                <source src="./1 u nasim godinama.mp4" type="video/mp4">
            </video>
            <h3>1 u nasim godinama</h3>
            <p>Moj spot</p>
        </div>

        <div class="video-card">
            <video controls>
                <source src="./lj.mp4" type="video/mp4">
            </video>
            <h3>Lj</h3>
            <p>Moj spot</p>
        </div>

    </div>
    <div class="footer"><p>© 2026 | Napravljeno sa ❤️</p></div>
</body>
</html>
