<!DOCTYPE html>
<html>
<head>
<title>Veljo Video Muzika</title>

<style>
body {
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

button {
    font-size:22px;
    padding:15px 30px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
}

video {
    width:80%;
    max-width:900px;
}
</style>

</head>

<body>

<h1>🎵 Veljo Video Muzika 🎵</h1>

<video id="player" controls></video>

<div id="buttons">
Učitavanje videa...
</div>


<script>

const user = "velimir62";
const repo = "veljo-video-muzika";

fetch(`https://api.github.com/repos/${user}/${repo}/contents/`)
.then(response => response.json())
.then(files => {

    let buttons = "";

    files.forEach(file => {

        if(file.name.toLowerCase().endsWith(".mp4")) {

            buttons += `
            <button onclick="play('${file.name}')">
            🎬 ${file.name}
            </button>
            `;

        }

    });

    document.getElementById("buttons").innerHTML = buttons;

});


function play(video) {

    let player=document.getElementById("player");

    player.src=video;
    player.play();

}

</script>

</body>
</html>
