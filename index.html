<!DOCTYPE html>
<html>
<head>

<title>Veljo Video Muzika</title>

<style>

body {
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
}

button {
    font-size:22px;
    padding:15px 30px;
    margin:10px;
    border-radius:10px;
    cursor:pointer;
    background:gold;
}

button:hover {
    background:white;
}

video {
    width:80%;
    max-width:900px;
}

</style>

</head>


<body>

<h1>🎵 Veljo Video Muzika 🎵</h1>


<video id="player" controls></video>


<div id="buttons">
Učitavanje videa...
</div>



<script>


const user = "velimir62";
const repo = "veljo-video-muzika";


let videos = [];
let current = 0;



fetch(`https://api.github.com/repos/${user}/${repo}/contents/`)

.then(response => response.json())

.then(files => {


    files.forEach(file => {


        if(file.name.toLowerCase().endsWith(".mp4")) {

            videos.push(file.name);

        }


    });



    let buttons = "";


    videos.forEach(video => {


        buttons += `

        <button onclick="play('${video}')">
        🎬 ${video}
        </button>

        `;


    });



    document.getElementById("buttons").innerHTML = buttons;


});





function play(video) {


    current = videos.indexOf(video);


    let player = document.getElementById("player");


    player.src = video;


    player.play();


}





document.getElementById("player").onended = function() {


    current++;


    if(current >= videos.length) {

        current = 0;

    }


    play(videos[current]);


};



</script>


</body>
</html>
